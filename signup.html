<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      /* Mountain/forest landscape background - Yosemite style */
      background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* "Sign Up" title top-left like in image */
    .page-title {
      position: absolute;
      top: 18px;
      left: 22px;
      font-size: 20px;
      font-weight: bold;
      color: #222;
     
      padding: 2px 8px;
      border-radius: 2px;
    }

    /* Center the form card */
    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 30px 36px 36px;
      width: 300px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #222;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-bottom: 1px solid #999;
      background: transparent;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus {
      border-bottom: 1px solid #333;
    }

    .btn-signup {
      background: #e53e00;
      color: #fff;
      border: none;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-signup:hover { background: #c73500; }
  </style>
</head>
<body>

<span class="page-title">Sign Up</span>

<div class="wrapper">
  <div class="card">

    <div class="form-group">
      <label>Username:</label>
      <input type="text" name="username" />
    </div>

    <div class="form-group">
      <label>Email:</label>
      <input type="email" name="email" />
    </div>

    <div class="form-group">
      <label>Password:</label>
      <input type="password" name="password" />
    </div>

    <button class="btn-signup">Sign Up</button>

  </div>
</div>

</body>
</html>
